name: Update ORBIS feed

# best-effort schedule + 手動実行 + main への push で起動。
# GitHub の schedule は混雑時にドロップされやすく、特に */15 や :00/:15/:30/:45 の
# 「丸い分」は最も混雑して落ちやすい。混雑分を避けたオフセット分・20分間隔にして発火率を上げる。
# (それでも GitHub の cron は best-effort。確実な定期更新が必要なら外部cronから
#  workflow_dispatch / repository_dispatch を叩く方式が確実。)
on:
  schedule:
    - cron: '7,27,47 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る（重複デプロイ防止）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      # GDELT から最新を取得して events.json を生成。
      # 失敗してもデプロイは続行し、orbis.html 内蔵スナップショットにフォールバックさせる。
      - name: Generate events.json
        run: python ingest.py || echo "ingest failed -> snapshot fallback"

      - name: Generate macro.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python macro.py || echo "macro fetch failed -> FX panel will show 'no data'"

      - name: Assemble site
        run: |
          mkdir -p site
          cp orbis.html site/index.html
          if [ -f events.json ]; then cp events.json site/events.json; else echo "no events.json"; fi
          if [ -f countries.json ]; then cp countries.json site/countries.json; else echo "no countries.json"; fi
          if [ -f macro.json ]; then cp macro.json site/macro.json; else echo "no macro.json"; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
